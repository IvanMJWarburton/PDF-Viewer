<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    header a {
      font-size: 0.8rem;
      color: #666;
      text-decoration: none;
    }
    header a:hover { color: #000; }

    main {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }

    label.section { font-size: 0.75rem; color: #666; display: block; margin-bottom: 0.4rem; }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 4px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }
    .upload-zone:hover, .upload-zone.over {
      border-color: #555;
      background: #fafafa;
    }
    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-zone p { font-size: 0.85rem; color: #555; }
    .upload-zone small { font-size: 0.72rem; color: #aaa; display: block; margin-top: 0.25rem; }

    /* File info */
    .info-box {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.85rem 1rem;
      font-size: 0.8rem;
      color: #333;
    }
    .info-box .name { font-weight: 600; word-break: break-all; }
    .info-box .meta { color: #888; font-size: 0.72rem; margin-top: 0.25rem; }

    /* Status */
    .status-box {
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.85rem 1rem;
      font-size: 0.8rem;
    }
    .status-row { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
    .status-row:last-child { margin-bottom: 0; }
    .status-key { color: #888; }
    .status-val { font-weight: 500; word-break: break-all; text-align: right; max-width: 160px; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #ccc; margin-right: 4px; }
    .dot.live { background: #4caf50; }

    /* Buttons */
    button {
      width: 100%;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: sans-serif;
    }

    .btn-publish {
      background: #222;
      color: #fff;
    }
    .btn-publish:hover { background: #000; }
    .btn-publish:disabled { background: #aaa; cursor: not-allowed; }

    .btn-remove {
      background: #fff;
      color: #c00;
      border: 1px solid #ecc;
    }
    .btn-remove:hover { background: #fff5f5; }

    /* ── PREVIEW ── */
    .preview {
      display: flex;
      flex-direction: column;
      background: #e8e8e8;
    }

    .preview-bar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 0.6rem 1.2rem;
      font-size: 0.75rem;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
    .preview-bar span:last-child { color: #333; font-weight: 500; }

    .preview-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .preview-empty {
      font-size: 0.85rem;
      color: #aaa;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #222;
      color: #fff;
      padding: 0.65rem 1.2rem;
      border-radius: 4px;
      font-size: 0.8rem;
      transition: transform 0.3s;
      z-index: 999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      main { grid-template-columns: 1fr; }
      .preview { min-height: 50vh; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Admin</h1>
    <a href="index.html">← View Menu</a>
  </header>

  <main>
    <aside class="sidebar">

      <div>
        <label class="section">Upload PDF</label>
        <div class="upload-zone" id="upload-zone">
          <input type="file" id="file-input" accept="application/pdf" />
          <p>Click or drag & drop</p>
          <small>PDF files only</small>
        </div>
      </div>

      <div id="file-info" style="display:none;">
        <label class="section">Selected File</label>
        <div class="info-box">
          <div class="name" id="sel-name"></div>
          <div class="meta" id="sel-size"></div>
        </div>
        <button class="btn-publish" id="publish-btn" style="margin-top:0.75rem;">Publish Menu</button>
      </div>

      <div>
        <label class="section">Current Menu</label>
        <div class="status-box">
          <div class="status-row">
            <span class="status-key">Status</span>
            <span class="status-val"><span class="dot" id="dot"></span><span id="status-word">None</span></span>
          </div>
          <div class="status-row">
            <span class="status-key">File</span>
            <span class="status-val" id="live-name">—</span>
          </div>
          <div class="status-row">
            <span class="status-key">Updated</span>
            <span class="status-val" id="live-date">—</span>
          </div>
        </div>
        <button class="btn-remove" id="remove-btn" style="margin-top:0.75rem; display:none;">Remove Menu</button>
      </div>

    </aside>

    <div class="preview">
      <div class="preview-bar">
        <span>Preview</span>
        <span id="preview-label">—</span>
      </div>
      <div class="preview-body">
        <div class="preview-empty" id="preview-empty">No file selected</div>
        <iframe id="preview-iframe" title="PDF Preview"></iframe>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let selectedDataUrl = null;
    let selectedFile = null;

    const fileInput     = document.getElementById('file-input');
    const uploadZone    = document.getElementById('upload-zone');
    const publishBtn    = document.getElementById('publish-btn');
    const removeBtn     = document.getElementById('remove-btn');
    const fileInfo      = document.getElementById('file-info');
    const selName       = document.getElementById('sel-name');
    const selSize       = document.getElementById('sel-size');
    const previewIframe = document.getElementById('preview-iframe');
    const previewEmpty  = document.getElementById('preview-empty');
    const previewLabel  = document.getElementById('preview-label');
    const liveName      = document.getElementById('live-name');
    const liveDate      = document.getElementById('live-date');
    const dot           = document.getElementById('dot');
    const statusWord    = document.getElementById('status-word');

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f?.type === 'application/pdf') handleFile(f);
      else toast('Please use a PDF file.');
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      selName.textContent = file.name;
      selSize.textContent = formatBytes(file.size);
      fileInfo.style.display = 'block';

      const reader = new FileReader();
      reader.onload = e => {
        selectedDataUrl = e.target.result;
        previewEmpty.style.display = 'none';
        previewIframe.style.display = 'block';
        previewIframe.src = selectedDataUrl;
        previewLabel.textContent = file.name;
      };
      reader.readAsDataURL(file);
    }

    publishBtn.addEventListener('click', () => {
      if (!selectedDataUrl) return;
      try {
        localStorage.setItem('menu_pdf_dataurl', selectedDataUrl);
        localStorage.setItem('menu_pdf_name', selectedFile.name);
        localStorage.setItem('menu_pdf_date', new Date().toLocaleString());
        updateStatus();
        toast('Menu published.');
      } catch(e) {
        toast(e.name === 'QuotaExceededError' ? 'File too large for storage.' : 'Error: ' + e.message);
      }
    });

    removeBtn.addEventListener('click', () => {
      if (!confirm('Remove the live menu?')) return;
      localStorage.removeItem('menu_pdf_dataurl');
      localStorage.removeItem('menu_pdf_name');
      localStorage.removeItem('menu_pdf_date');
      updateStatus();
      toast('Menu removed.');
    });

    function updateStatus() {
      const name = localStorage.getItem('menu_pdf_name');
      const date = localStorage.getItem('menu_pdf_date');
      const live = !!localStorage.getItem('menu_pdf_dataurl');

      dot.className = 'dot' + (live ? ' live' : '');
      statusWord.textContent = live ? 'Live' : 'None';
      liveName.textContent = name || '—';
      liveDate.textContent = date || '—';
      removeBtn.style.display = live ? 'block' : 'none';
    }

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(2) + ' MB';
    }

    // Init
    updateStatus();
    const existing = localStorage.getItem('menu_pdf_dataurl');
    if (existing) {
      previewEmpty.style.display = 'none';
      previewIframe.style.display = 'block';
      previewIframe.src = existing;
      previewLabel.textContent = localStorage.getItem('menu_pdf_name') || 'Current Menu';
    }
  </script>

</body>
</html>
