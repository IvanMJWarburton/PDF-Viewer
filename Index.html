<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }



    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .viewer {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      display: block;
    }

    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40vh;
      color: #999;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Menu</h1>

  </header>

  <main>
    <div class="viewer">
      <div class="empty" id="empty">No menu uploaded yet.</div>
      <iframe id="pdf-viewer" style="display:none;"></iframe>
    </div>
  </main>

  <script>
    const stored = localStorage.getItem('menu_pdf_dataurl');
    if (stored) {
      document.getElementById('empty').style.display = 'none';
      const viewer = document.getElementById('pdf-viewer');
      viewer.src = stored;
      viewer.style.display = 'block';
    }

    window.addEventListener('storage', (e) => {
      if (e.key === 'menu_pdf_dataurl') {
        if (e.newValue) {
          document.getElementById('empty').style.display = 'none';
          const v = document.getElementById('pdf-viewer');
          v.src = e.newValue;
          v.style.display = 'block';
        } else {
          document.getElementById('empty').style.display = 'flex';
          document.getElementById('pdf-viewer').style.display = 'none';
        }
      }
    });
  </script>
</body>
</html>
